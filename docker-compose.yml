# ─────────────────────────────────────────────────────────────
#  Infrastructure services for local development
#  Run: docker-compose up -d
#  UI tools:
#    Redis Commander: http://localhost:8081
#    Mongo Express:   http://localhost:8082
# ─────────────────────────────────────────────────────────────

services:

  # ── Databases ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: fd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: fooddash_auth,fooddash_payments
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create-multiple-pg-databases.sh:/docker-entrypoint-initdb.d/create-dbs.sh
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: fd-mongodb
    restart: unless-stopped
    # Single-node replica set needed for transactions (required by order service later)
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongo_data:/data/db
    ports:
      - '27018:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-init:
    image: mongo:7
    container_name: fd-mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    restart: 'no'
    entrypoint: >
      mongosh --host mongodb:27017
        --eval "try { rs.status() } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] }) }"

  redis:
    image: redis:7-alpine
    container_name: fd-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App Services ──────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: fd-auth-service
    restart: unless-stopped
    environment:
      PORT: 3001
      GRPC_PORT: 50051
      NODE_ENV: production
      SERVICE_NAME: auth-service
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fooddash_auth
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      JWT_ACCESS_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 7d
    ports:
      - '3001:3001'
      - '50051:50051'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: fd-user-service
    restart: unless-stopped
    environment:
      PORT: 3002
      NODE_ENV: production
      SERVICE_NAME: user-service
      MONGODB_URI: mongodb://mongodb:27017/fooddash_users?replicaSet=rs0&directConnection=true
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: 300
    ports:
      - '3002:3002'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: fd-api-gateway
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      SERVICE_NAME: api-gateway
      JWT_SECRET: change-me-in-production
      AUTH_SERVICE_URL: http://auth-service:3001
      AUTH_SERVICE_GRPC_URL: auth-service:50051
      USER_SERVICE_URL: http://user-service:3002
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_MAX: 60
      RATE_LIMIT_WINDOW_MS: 60000
    ports:
      - '3000:3000'
    depends_on:
      - auth-service
      - user-service

  # frontend:
  #   build:
  #     context: .
  #     dockerfile: apps/frontend/Dockerfile
  #   container_name: fd-frontend
  #   restart: unless-stopped
  #   environment:
  #     API_GATEWAY_URL: http://api-gateway:3000
  #     NEXT_PUBLIC_APP_URL: http://localhost:3010
  #   ports:
  #     - '3010:3010'
  #   depends_on:
  #     - api-gateway

  # ── Dev UI Tools ───────────────────────────────────────────

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: fd-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis

  mongo-express:
    image: mongo-express:latest
    container_name: fd-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: 'false'
    ports:
      - '8082:8081'
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
